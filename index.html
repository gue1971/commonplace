<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4efe5" />
    <title>Commonplace</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button id="topbar-back-button" class="back-link topbar-back-button" type="button" hidden aria-label="戻る">
          <svg class="icon-glyph icon-glyph-back" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          </svg>
        </button>
        <h1 id="app-title">Commonplace</h1>
        <div class="topbar-actions">
          <button id="toggle-library-view-button" class="secondary-button icon-button toolbar-icon-button" type="button" aria-label="リスト表示に切り替え">
            <svg class="icon-glyph icon-glyph-grid" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4.5" y="4.5" width="6" height="6" rx="1.1" stroke="currentColor" stroke-width="2" fill="none" />
              <rect x="13.5" y="4.5" width="6" height="6" rx="1.1" stroke="currentColor" stroke-width="2" fill="none" />
              <rect x="4.5" y="13.5" width="6" height="6" rx="1.1" stroke="currentColor" stroke-width="2" fill="none" />
              <rect x="13.5" y="13.5" width="6" height="6" rx="1.1" stroke="currentColor" stroke-width="2" fill="none" />
            </svg>
            <svg class="icon-glyph icon-glyph-list" viewBox="0 0 24 24" aria-hidden="true" hidden>
              <path d="M6 7.5h12M6 12h12M6 16.5h12" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" fill="none" />
              <circle cx="4" cy="7.5" r="1" fill="currentColor" />
              <circle cx="4" cy="12" r="1" fill="currentColor" />
              <circle cx="4" cy="16.5" r="1" fill="currentColor" />
            </svg>
          </button>
          <button id="load-data-button" class="secondary-button icon-button toolbar-icon-button" type="button" aria-label="インポート">
            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 4.5v10M8 10.5l4 4 4-4M5 19.5h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </button>
          <button id="save-data-button" class="secondary-button icon-button toolbar-icon-button" type="button" aria-label="エクスポート">
            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19.5v-10M8 13.5l4-4 4 4M5 4.5h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </button>
          <button id="create-book-top-button" class="secondary-button icon-button toolbar-icon-button" type="button" aria-label="追加">
            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" fill="none" />
            </svg>
          </button>
          <button id="open-search-button" class="secondary-button icon-button toolbar-icon-button" type="button" aria-label="検索">
            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M11 18.5a7.5 7.5 0 1 0 0-15 7.5 7.5 0 0 0 0 15ZM16.5 16.5 20 20" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </button>
          <button id="topbar-create-entry-button" class="secondary-button icon-button" type="button" hidden aria-label="メモを追加">
            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" fill="none" />
            </svg>
          </button>
        </div>
      </header>

      <input id="import-file-input" type="file" accept="application/json,.json" hidden />
      <main id="app" class="app-main"></main>
    </div>

    <template id="library-template">
      <section class="screen">
        <form id="library-search-form" class="panel controls-panel">
          <label class="field">
            <span>本をさがす</span>
            <input id="library-search-input" type="search" placeholder="タイトル・著者等" />
          </label>

          <label class="field field-compact">
            <span class="field-label-row">
              <span>並び替え</span>
              <button id="library-sort-direction-button" class="sort-direction-button sort-direction-button-inline" type="button" aria-label="並び順を切り替え">↓</button>
            </span>
            <div class="sort-control">
              <select id="library-sort-select">
                <option value="updated">更新日</option>
                <option value="title">タイトル</option>
                <option value="created">追加日</option>
              </select>
            </div>
          </label>
        </form>

        <div id="library-grid" class="library-grid"></div>
      </section>
    </template>

    <template id="book-template">
      <section class="screen">
        <div class="panel book-subbar">
          <div class="field book-search-field">
            <span>この本を検索</span>
            <form id="book-subbar-search-form" class="book-subbar-search">
              <input id="book-subbar-search-input" type="search" aria-label="この本を検索" placeholder="見出し・引用・メモなど" />
            </form>
          </div>
          <span id="book-subbar-updated" class="book-subbar-updated"></span>
        </div>
        <div id="book-entry-list" class="entry-list"></div>
      </section>
    </template>

    <template id="search-template">
      <section class="screen">
        <form id="global-search-form" class="panel controls-panel controls-panel-single search-panel">
          <label class="field">
            <span>キーワード</span>
            <input id="global-search-input" type="search" placeholder="本のタイトル・著者・見出し・引用・メモ・タグ・位置情報" />
          </label>
        </form>

        <div id="search-results" class="search-results"></div>
      </section>
    </template>

    <dialog id="book-dialog" class="dialog">
      <form id="book-form" class="dialog-form" method="dialog">
        <div class="dialog-header">
          <h3 id="book-dialog-title">新しい本</h3>
        </div>

        <label class="field">
          <span>タイトル *</span>
          <input name="title" type="text" required maxlength="200" />
        </label>

        <label class="field">
          <span>著者</span>
          <input name="author" type="text" maxlength="120" />
        </label>

        <label class="field">
          <span>表紙画像パス</span>
          <input name="cover_image" type="text" placeholder="任意" />
        </label>

        <label class="field">
          <span>表紙画像アップロード</span>
          <input name="cover_file" type="file" accept="image/*" />
        </label>

        <div class="cover-preview-block">
          <span class="field-label">プレビュー</span>
          <div id="book-cover-preview" class="book-cover-preview"></div>
        </div>

        <div class="form-actions">
          <button class="ghost-button" type="button" id="clear-book-cover-button">表紙をクリア</button>
          <button class="secondary-button" type="button" id="cancel-book-button">キャンセル</button>
          <button class="primary-button" type="submit" id="submit-book-button">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="entry-dialog" class="dialog">
      <form id="entry-form" class="dialog-form entry-dialog-form">
        <div class="dialog-header">
          <h3 id="entry-dialog-title">編集</h3>
          <p id="entry-book-label" class="muted-text entry-book-label"></p>
        </div>

        <label class="field">
          <span>見出し *</span>
          <input name="core" type="text" required maxlength="140" placeholder="短い見出し" />
        </label>

        <label class="field">
          <span>引用・抜粋</span>
          <textarea name="context_quote" rows="6" placeholder="引用やAI要約を貼り付け"></textarea>
        </label>

        <label class="field">
          <span>要約</span>
          <textarea name="context_summary" rows="4" placeholder="客観要約"></textarea>
        </label>

        <label class="field">
          <span>メモ・考え</span>
          <textarea name="context_note" rows="5" placeholder="主観、感想、問いの芽"></textarea>
        </label>

        <label class="field">
          <span>タグ</span>
          <input name="tags" type="text" placeholder="カンマ区切りで入力" />
        </label>

        <label class="field">
          <span>位置情報</span>
          <input name="locator" type="text" placeholder="章名 / location / 自由記述" />
        </label>

        <label class="field-checkbox">
          <input name="favorite" type="checkbox" />
          <span>お気に入り ★</span>
        </label>

        <label class="field">
          <span>関連リンク</span>
          <input name="context_link" type="text" placeholder="関連メモやURL" />
        </label>

        <label class="field">
          <span>画像パス</span>
          <textarea name="context_images" rows="3" placeholder="images/example-1.png&#10;images/example-2.png"></textarea>
        </label>

        <div class="cover-preview-block">
          <span class="field-label">画像プレビュー</span>
          <div id="entry-image-preview" class="entry-image-preview"></div>
        </div>

        <div class="form-actions">
          <button id="clear-entry-image-button" class="ghost-button" type="button">画像をクリア</button>
          <button id="cancel-entry-button" class="secondary-button" type="button">閉じる</button>
          <button id="delete-entry-button" class="danger-button" type="button">削除</button>
          <button class="primary-button" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="entry-view-dialog" class="dialog">
      <div class="dialog-form entry-view-dialog-form">
        <div class="dialog-header">
          <h3 id="entry-view-title">メモ</h3>
          <p id="entry-view-book-label" class="muted-text entry-book-label"></p>
        </div>

        <div id="entry-view-content" class="entry-view-content"></div>

        <div class="form-actions">
          <button id="close-entry-view-button" class="secondary-button" type="button">閉じる</button>
          <button id="edit-entry-view-button" class="primary-button" type="button">編集</button>
          <button id="favorite-entry-view-button" class="ghost-button favorite-toggle-button" type="button" aria-pressed="false" aria-label="お気に入りに追加">☆</button>
        </div>
      </div>
    </dialog>

    <dialog id="entry-image-dialog" class="dialog entry-image-dialog">
      <div class="dialog-form entry-image-dialog-form">
        <div class="dialog-header">
          <h3 id="entry-image-dialog-title">画像</h3>
        </div>
        <div class="entry-image-lightbox">
          <img id="entry-image-lightbox-image" class="entry-image-lightbox-image" alt="" />
        </div>
        <div class="form-actions">
          <button id="close-entry-image-button" class="secondary-button" type="button">閉じる</button>
        </div>
      </div>
    </dialog>

    <dialog id="delete-entry-dialog" class="dialog">
      <form id="delete-entry-form" class="dialog-form confirm-dialog-form" method="dialog">
        <div class="dialog-header">
          <h3>このメモを削除しますか</h3>
        </div>
        <p id="delete-entry-summary" class="muted-text confirm-copy"></p>
        <div class="form-actions">
          <button id="cancel-delete-entry-button" class="secondary-button" type="button">キャンセル</button>
          <button id="confirm-delete-entry-button" class="danger-button" type="submit">削除</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
